<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Account</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js");
    }
    </script>
</head>
<body>

    <h1>Love Account ❤️</h1>

    <div class="inputs-row">
        <input type="text" id="nome1" placeholder="Person's Name 1">

        <div class="heart">
            <svg viewBox="0 0 24 24" class="heart-svg">
                <path d="M12 21s-6.2-4.3-9.3-8.4C-0.4 9.1 0.2 4.8 3.1 2.5 5.3 0.7 8.7 1 10.7 3.2L12 4.7l1.3-1.5C15.3 1 18.7 0.7 20.9 2.5c2.9 2.3 3.5 6.6 0.4 10.1C18.2 16.7 12 21 12 21z"/>
            </svg>
            <span id="percentagem">0%</span>
        </div>

        <input type="text" id="nome2" placeholder="Person's Name 2">
    </div>

    <button id="calcular">Calculating Love</button>

    <p id="frase"></p>

</body>
</html>
