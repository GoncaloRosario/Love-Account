<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Offline - Love Account</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }
        .heart {
            font-size: 80px;
            color: #ff4d6d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="heart">❤️</div>
    <h1>You are offline…</h1>
    <p>Love awaits you when you return to the internet.</p>
</body>
</html>
